<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحه پیدا نشد | فانگل</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;700&display=swap');

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #2b2b2b 0%, #0d0d0d 100%);
            font-family: 'Vazirmatn', sans-serif;
            color: white;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 500px;
            padding: 50px;
            background: rgba(40, 40, 40, 0.5);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        h1 {
            font-size: 6rem;
            margin: 0;
            color: #E20A3E;
            text-shadow: 0 0 20px rgba(226, 10, 62, 0.5);
        }

        h2 { margin-top: -10px; font-weight: 700; }

        p { color: #b3b3b3; line-height: 1.8; margin-bottom: 30px; }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #E20A3E;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #ff1a4f;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(226, 10, 62, 0.4);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>404</h1>
        <h2>مسیر را گم کردید؟</h2>
        <p>
            به نظر می‌رسد این بخش از دنیای ماینکرفت فانگل هنوز ساخته نشده یا آدرس را اشتباه وارد کرده‌اید. 
            بیایید به جای امن برگردیم!
        </p>
        <a href="/" class="btn">بازگشت به خانه</a>
    </div>

</body>
</html>
