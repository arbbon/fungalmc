<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/arbbon/cdn/main/FUNGAL%20-%20Transparent%20Main%20Logo.png" />
    <title>فـانـگـل • صفحه پیدا نشد</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    
    <style>
      body {
        font-family: 'Vazirmatn', sans-serif;
        background-color: #0b0b0f;
        overflow-x: hidden;
      }
      
      .text-glow {
        text-shadow: 0 0 15px rgba(226, 10, 62, 0.6);
      }
      
      .glow-box-red {
        box-shadow: 0 0 35px rgba(226, 10, 62, 0.25);
      }
      
      .glow-btn:hover {
        box-shadow: 0 0 25px rgba(226, 10, 62, 0.5);
      }
      
      .grid-bg {
        background-image: 
          linear-gradient(to right, rgba(226, 10, 62, 0.04) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(226, 10, 62, 0.04) 1px, transparent 1px);
        background-size: 35px 35px;
        animation: gridMove 25s linear infinite;
      }
      
      @keyframes gridMove {
        0% { background-position: 0 0; }
        100% { background-position: 35px 35px; }
      }

      .float-animation {
        animation: float 6s ease-in-out infinite;
      }
      
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-15px); }
        100% { transform: translateY(0px); }
      }

      .slow-pulse {
        animation: slow-pulse 8s infinite ease-in-out;
      }
      
      @keyframes slow-pulse {
        0%, 100% { opacity: 0.2; transform: scale(1); filter: blur(90px); }
        50% { opacity: 0.45; transform: scale(1.15); filter: blur(110px); }
      }

      .sparkle {
        position: absolute;
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background-color: rgba(226, 10, 62, 0.6);
        animation: rise 5s infinite ease-in-out;
      }
      
      @keyframes rise {
        0% { transform: translateY(100px) scale(0); opacity: 0; }
        50% { opacity: 0.8; }
        100% { transform: translateY(-120px) scale(1.5); opacity: 0; }
      }
    </style>
  </head>
  <body class="relative min-h-screen text-white flex flex-col justify-between overflow-hidden">
    
    <div class="absolute -top-40 -left-40 w-96 h-96 rounded-full bg-[#E20A3E] slow-pulse pointer-events-none"></div>
    <div class="absolute -bottom-40 -right-40 w-96 h-96 rounded-full bg-[#E20A3E] slow-pulse pointer-events-none" style="animation-delay: -4s;"></div>
    
    <div class="absolute inset-x-0 inset-y-0 grid-bg pointer-events-none"></div>

    <div class="absolute inset-0 pointer-events-none z-0 overflow-hidden">
      <div class="sparkle" style="top: 25%; left: 15%; animation-delay: 0.5s; animation-duration: 4.5s;"></div>
      <div class="sparkle" style="top: 40%; left: 80%; animation-delay: 1.2s; animation-duration: 5.5s;"></div>
      <div class="sparkle" style="top: 75%; left: 25%; animation-delay: 2.5s; animation-duration: 6s;"></div>
      <div class="sparkle" style="top: 60%; left: 50%; animation-delay: 0s; animation-duration: 3.8s;"></div>
      <div class="sparkle" style="top: 15%; left: 70%; animation-delay: 3s; animation-duration: 5.2s;"></div>
    </div>

    <header class="w-full max-w-7xl mx-auto px-6 py-6 flex justify-between items-center z-10 relative">
      <div class="flex items-center gap-3">
        <img 
          src="https://raw.githubusercontent.com/arbbon/cdn/main/FUNGAL%20-%20Transparent%20Main%20Logo.png" 
          alt="لوگو" 
          class="w-12 h-12 object-contain"
        />
        <div class="flex flex-col text-right">
          <span class="font-black text-xl tracking-wide bg-gradient-to-l from-white via-neutral-100 to-neutral-400 bg-clip-text text-transparent">فـانـگـل</span>
          <span class="font-medium text-[10px] text-neutral-400 tracking-wider">سرویس گیمینگ ماینکرفت</span>
        </div>
      </div>
    </header>

    <main class="w-full flex-grow flex items-center justify-center p-6 z-10">
      <div class="relative w-full max-w-lg glow-box-red transition-all duration-500 hover:scale-[1.01]">
        
        <div class="relative rounded-3xl p-8 md:p-12 text-center overflow-hidden border border-white/5 bg-zinc-950/70 backdrop-blur-xl flex flex-col items-center">
          
          <div class="absolute top-0 left-0 right-0 h-[3px] bg-gradient-to-r from-[#E20A3E] via-[#ef4444] to-[#E20A3E]"></div>
          
          <div class="relative mb-6">
            <h1 class="text-8xl md:text-9xl font-black tracking-widest text-glow select-none text-[#E20A3E] float-animation opacity-90 font-mono">
              ۴۰۴
            </h1>
            <div class="absolute -inset-1 rounded-full bg-[#E20A3E] opacity-10 blur-xl"></div>
          </div>
          
          <h2 class="text-xl md:text-2xl font-extrabold mb-3 text-white text-glow">
            مسیر رو اشتباه اومدی، رفیق!
          </h2>
          
          <p class="text-sm text-neutral-400 mb-8 max-w-sm leading-relaxed">
            به نظر می‌رسه صفحه‌ای که دنبالش بودی تغییر کرده یا کلاً وجود نداره. می‌تونی از دکمه زیر برای بازگشت به صفحه اصلی استفاده کنی.
          </p>

          <div class="w-2/3 h-px bg-zinc-800 mb-8"></div>

          <div class="flex flex-col sm:flex-row gap-4 w-full justify-center">
            <a 
              href="/"
              class="glow-btn w-full sm:w-auto inline-flex items-center justify-center gap-2 px-8 py-3.5 bg-gradient-to-r from-[#E20A3E] to-[#b3082f] text-white rounded-2xl font-bold transition-all duration-300 transform active:scale-95 shadow-lg shadow-[#E20A3E]/20"
            >
              <span>بازگشت به صفحه اصلی</span>
            </a>
          </div>

        </div>
      </div>
    </main>

    <footer class="w-full text-center py-6 text-xs text-neutral-500 z-10 relative">
      <p class="select-none dir-ltr font-mono">
        &copy; <span id="current-year">2026</span> Fungal Server. All rights reserved.
      </p>
    </footer>

    <script>
      document.getElementById('current-year').textContent = new Date().getFullYear();
    </script>
  </body>
</html>
