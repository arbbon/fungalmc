<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/arbbon/cdn/main/FUNGAL%20-%20Transparent%20Main%20Logo.png" />
    <title>صفحه پیدا نشد • فـانـگـل</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    
    <style>
      body {
        font-family: 'Vazirmatn', sans-serif;
        background-color: #0b0b0f;
        overflow-x: hidden;
      }
      
      .text-glow {
        text-shadow: 0 0 15px rgba(226, 10, 62, 0.6);
      }
      .text-glow-gold {
        text-shadow: 0 0 15px rgba(245, 158, 11, 0.6);
      }
      .glow-box-red {
        box-shadow: 0 0 35px rgba(226, 10, 62, 0.25);
      }
      .glow-btn:hover {
        box-shadow: 0 0 25px rgba(226, 10, 62, 0.5);
      }
      
      .grid-bg {
        background-image: 
          linear-gradient(to right, rgba(226, 10, 62, 0.04) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(226, 10, 62, 0.04) 1px, transparent 1px);
        background-size: 35px 35px;
        animation: gridMove 25s linear infinite;
      }
      
      @keyframes gridMove {
        0% { background-position: 0 0; }
        100% { background-position: 35px 35px; }
      }

      .float-animation {
        animation: float 6s ease-in-out infinite;
      }
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-15px); }
        100% { transform: translateY(0px); }
      }

      .slow-pulse {
        animation: slow-pulse 8s infinite ease-in-out;
      }
      @keyframes slow-pulse {
        0%, 100% { opacity: 0.2; transform: scale(1); filter: blur(90px); }
        50% { opacity: 0.45; transform: scale(1.15); filter: blur(110px); }
      }

      .sparkle {
        position: absolute;
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background-color: rgba(226, 10, 62, 0.6);
        animation: rise 5s infinite ease-in-out;
      }
      @keyframes rise {
        0% { transform: translateY(100px) scale(0); opacity: 0; }
        50% { opacity: 0.8; }
        100% { transform: translateY(-120px) scale(1.5); opacity: 0; }
      }
    </style>
  </head>
  <body class="relative min-h-screen text-white flex flex-col justify-between overflow-hidden">
    
    <div class="absolute -top-40 -left-40 w-96 h-96 rounded-full bg-[#E20A3E] slow-pulse pointer-events-none"></div>
    <div class="absolute -bottom-40 -right-40 w-96 h-96 rounded-full bg-[#E20A3E] slow-pulse pointer-events-none" style="animation-delay: -4s;"></div>
    
    <div class="absolute inset-x-0 inset-y-0 grid-bg pointer-events-none"></div>

    <div class="absolute inset-0 pointer-events-none z-0 overflow-hidden">
      <div class="sparkle" style="top: 25%; left: 15%; animation-delay: 0.5s; animation-duration: 4.5s;"></div>
      <div class="sparkle" style="top: 40%; left: 80%; animation-delay: 1.2s; animation-duration: 5.5s;"></div>
      <div class="sparkle" style="top: 75%; left: 25%; animation-delay: 2.5s; animation-duration: 6s;"></div>
      <div class="sparkle" style="top: 60%; left: 50%; animation-delay: 0s; animation-duration: 3.8s;"></div>
      <div class="sparkle" style="top: 15%; left: 70%; animation-delay: 3s; animation-duration: 5.2s;"></div>
    </div>

    <header class="w-full max-w-7xl mx-auto px-6 py-6 flex justify-between items-center z-10 relative">
      <a href="/" class="flex items-center gap-3 group">
        <img 
          src="https://raw.githubusercontent.com/arbbon/cdn/main/FUNGAL%20-%20Transparent%20Main%20Logo.png" 
          alt="لوگوی فانگل" 
          class="w-12 h-12 object-contain transition-transform duration-300 group-hover:rotate-12"
        />
        <div class="flex flex-col text-right">
          <span class="font-black text-xl tracking-wide bg-gradient-to-l from-white via-neutral-100 to-neutral-400 bg-clip-text text-transparent">فـانـگـل</span>
          <span class="font-medium text-[10px] text-neutral-400 tracking-wider">سرویس گیمینگ ماینکرفت</span>
        </div>
      </a>
      
      <button 
        id="copy-ip-header"
        onclick="copyServerIp()"
        class="hidden md:flex items-center gap-2 px-3.5 py-1.5 rounded-xl bg-zinc-900/60 hover:bg-zinc-800/80 border border-zinc-800 hover:border-[#E20A3E]/30 transition-all text-xs font-mono text-zinc-400 hover:text-white"
        title="کپی کردن آدرس سرور"
      >
        <span>mc.fngl.ir</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-[#E20A3E]">
          <rect width="14" height="14" x="8" y="8" rx="2" ry="2"/>
          <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>
        </svg>
      </button>
    </header>

    <main class="w-full flex-grow flex items-center justify-center p-6 z-10">
      <div class="relative w-full max-w-lg glow-box-red transition-all duration-500 hover:scale-[1.01]">
        
        <div class="relative rounded-3xl p-8 md:p-12 text-center overflow-hidden border border-white/5 bg-zinc-950/70 backdrop-blur-xl flex flex-col items-center">
          
          <div class="absolute top-0 left-0 right-0 h-[3px] bg-gradient-to-r from-[#E20A3E] via-[#ef4444] to-[#E20A3E]"></div>
          
          <div class="relative mb-6">
            <h1 class="text-8xl md:text-9xl font-black tracking-widest text-glow select-none text-[#E20A3E] float-animation opacity-90 font-mono">
              ۴۰۴
            </h1>
            <div class="absolute -inset-1 rounded-full bg-[#E20A3E] opacity-10 blur-xl"></div>
          </div>
          
          <h2 class="text-xl md:text-2xl font-extrabold mb-3 text-white text-glow">
            آدرس فرعی اشتباهه، رفیق!
          </h2>
          
          <p class="text-sm text-neutral-400 mb-8 max-w-sm leading-relaxed">
            به نظر می‌رسه که مسیرت رو در دالان‌های تاریک فانگل گم کردی. صفحه‌ای که دنبالش بودی، یا برداشته شده یا کلاً وجود نداشته!
          </p>

          <div class="w-2/3 h-px bg-zinc-800 mb-8"></div>

          <div class="flex flex-col sm:flex-row gap-4 w-full justify-center">
            
            <a 
              href="/"
              class="glow-btn inline-flex items-center justify-center gap-2 px-6 py-3.5 bg-gradient-to-r from-[#E20A3E] to-[#b3082f] text-white rounded-2xl font-bold transition-all duration-300 transform active:scale-95 group shadow-lg shadow-[#E20A3E]/20"
            >
              <span>بازگشت به خانه</span>
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="transition-transform duration-300 group-hover:translate-x-1">
                <path d="m15 18-6-6 6-6"/>
              </svg>
            </a>

            <button 
              onclick="copyServerIp()"
              class="inline-flex items-center justify-center gap-2 px-6 py-3.5 bg-zinc-900 border border-zinc-800 hover:border-zinc-700 text-zinc-300 hover:text-white rounded-2xl font-bold transition-all duration-300"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="14" height="14" x="8" y="8" rx="2" ry="2"/>
                <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>
              </svg>
              <span>کپی آی‌پی سرور</span>
            </button>
            
          </div>

          <div 
            id="toast"
            class="mt-6 text-emerald-450 text-xs font-semibold select-none flex items-center gap-1.5 opacity-0 transition-opacity duration-300"
          >
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-500">
              <path d="M20 6 9 17l-5-5"/>
            </svg>
            <span class="text-emerald-500">آدرس سرور (mc.fngl.ir) با موفقیت کپی شد!</span>
          </div>

        </div>
      </div>
    </main>

    <footer class="w-full text-center py-6 text-xs text-neutral-500 z-10 relative">
      <p class="select-none dir-ltr font-mono">
        &copy; <span id="current-year">2026</span> Fungal Server. All rights reserved.
      </p>
    </footer>

    <script>
      document.getElementById('current-year').textContent = new Date().getFullYear();

      function copyServerIp() {
        const ipText = "mc.fngl.ir";
        navigator.clipboard.writeText(ipText).then(() => {
          const toast = document.getElementById('toast');
          toast.classList.remove('opacity-0');
          toast.classList.add('opacity-100');
          
          setTimeout(() => {
            toast.classList.remove('opacity-100');
            toast.classList.add('opacity-0');
          }, 4000);
        }).catch(err => {
          console.error(err);
        });
      }
    </script>
  </body>
</html>
