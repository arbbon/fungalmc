<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سرور ماینکرفت فانگل | به‌زودی</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;700&display=swap');

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #2b2b2b 0%, #0d0d0d 100%);
            font-family: 'Vazirmatn', sans-serif;
            overflow: hidden;
        }

        .card {
            width: 90%;
            max-width: 500px;
            padding: 50px;
            background: rgba(40, 40, 40, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            text-align: center;
            position: relative;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 40px;
            background: #E20A3E;
            filter: blur(50px);
            opacity: 0.6;
            z-index: -1;
        }

        h1 {
            color: #fff;
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .highlight { color: #E20A3E; }

        p {
            color: #d1d1d1;
            line-height: 1.6;
            margin-bottom: 30px;
            font-weight: 300;
        }

        .date-box {
            display: inline-block;
            padding: 15px 30px;
            background: rgba(226, 10, 62, 0.15);
            border: 1px solid #E20A3E;
            border-radius: 15px;
            color: #fff;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .card { animation: fadeIn 1s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>سرور <span class="highlight">ماینکرفت فانگل</span></h1>
        <p>
            دنیایی جدید در انتظار شماست.<br>
            ما در حال آماده‌سازی زیرساخت‌هایی قدرتمند برای یک تجربه فراموش‌نشدنی هستیم.
        </p>
        <div class="date-box">
            تاریخ رونمایی: ۱۸ ژوئن ۲۰۲۶
        </div>
    </div>

</body>
</html>
